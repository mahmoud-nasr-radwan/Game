<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GAMER WAY - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Tailwind CDN -->
    <link rel="stylesheet" href="./output.css" />
    <link rel="stylesheet" href="./all.min.css" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body class="text-gray-300 bg-gray-900">
    <!-- NAV -->
    <header class="w-full border-b border-gray-200 bg-white">
      <div
        class="max-w-5xl mx-auto flex items-center justify-between px-4 py-3 text-xs"
      >
        <div class="flex items-center gap-2">
          <div class="logo"><span class="text-gray-900">GAMER WAY</span></div>
          <!-- <span class="font-semibold">EduConnect</span> -->
        </div>

        <!-- زر يرجع للهوم -->
        <a
          href="index.html"
          class="px-4 py-2 rounded-full border border-gray-300 text-gray-900 hover:bg-gray-50"
        >
          Back to Home
        </a>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="min-h-[calc(100vh-56px)] flex items-center justify-center px-4">
      <div
        class="w-full max-w-md bg-white border border-gray-100 rounded-xl px-6 md:px-8 py-10"
      >
        <h1 class="text-xl md:text-2xl font-semibold text-gray-900 mb-2">
          Login
        </h1>
        <p class="text-xs text-gray-500 mb-6">
          Enter your email and password to access your account.
        </p>

        <form class="space-y-5 text-xs">
          <div>
            <label class="block mb-1 text-gray-600">Email</label>
            <input
              type="email"
              class="w-full h-9 rounded-md border border-gray-200 bg-[#F5F7FA] px-3 focus:outline-none focus:ring-1 focus:ring-black"
            />
          </div>

          <div>
            <label class="block mb-1 text-gray-600">Password</label>
            <input
              type="password"
              class="w-full h-9 rounded-md border border-gray-200 bg-[#F5F7FA] px-3 focus:outline-none focus:ring-1 focus:ring-black"
            />
          </div>

          <div class="flex items-center justify-between text-[11px]">
            <label class="inline-flex items-center gap-1 text-gray-600">
              <input type="checkbox" class="rounded border-gray-300" />
              <span>Remember me</span>
            </label>
            <a href="#" class="text-gray-700 hover:underline">
              Forgot password?
            </a>
          </div>

          <button
            type="submit"
            class="w-full mt-2 inline-flex items-center justify-center px-4 py-2 rounded-full bg-black text-white text-xs hover:bg-gray-900"
          >
            Sign in
          </button>
        </form>

        <p class="mt-6 text-[11px] text-center text-gray-500">
          Don’t have an account?
          <a href="#" class="text-gray-800 font-medium underline">
            Sign up
          </a>
        </p>

        <!-- زر رجوع للهوم تحت كمان لو حابب -->
        <div class="mt-4 text-center">
          <a
            href="index.html"
            class="inline-flex items-center text-[11px] text-gray-500 hover:text-gray-900 underline"
          >
            ← Back to home
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
