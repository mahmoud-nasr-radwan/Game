<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./output.css" />
    <link rel="stylesheet" href="./all.min.css" />
    <title>Sign Up - Gamer Way</title>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-10 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <h2 class="text-3xl font-bold text-green-500 mb-8 text-center">New Account</h2>
        <form>
            <input type="text" placeholder="Full Name" class="w-full p-3 mb-4 bg-gray-700 text-white rounded focus:ring-2 focus:ring-green-500 outline-none">
            <input type="email" placeholder="Email Address" class="w-full p-3 mb-4 bg-gray-700 text-white rounded focus:ring-2 focus:ring-green-500 outline-none">
            <input type="password" placeholder="Password" class="w-full p-3 mb-6 bg-gray-700 text-white rounded focus:ring-2 focus:ring-green-500 outline-none">
            <button class="w-full py-3 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 mb-4">CREATE ACCOUNT</button>
            <a href="index.html" class="block text-center text-gray-500 hover:text-white">Back to Home</a>
        </form>
    </div>
</body>
</html>
